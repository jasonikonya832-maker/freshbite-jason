<svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="cookieGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6FCF97;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- COOKIE (Left) -->
  <!-- Cookie base circle -->
  <circle cx="35" cy="35" r="28" fill="url(#cookieGradient)" stroke="#654321" stroke-width="2"/>
  
  <!-- Bite mark -->
  <path d="M 58 20 Q 65 28 58 35 Q 65 42 58 50 Z" fill="white"/>
  
  <!-- Chocolate chips -->
  <circle cx="25" cy="25" r="3.5" fill="#654321" opacity="0.8"/>
  <circle cx="40" cy="20" r="2.5" fill="#654321" opacity="0.8"/>
  <circle cx="45" cy="35" r="3" fill="#654321" opacity="0.8"/>
  <circle cx="38" cy="48" r="2.8" fill="#654321" opacity="0.8"/>
  <circle cx="22" cy="42" r="3.2" fill="#654321" opacity="0.8"/>
  <circle cx="30" cy="38" r="2.5" fill="#654321" opacity="0.8"/>
  
  <!-- ORANGE (Right) -->
  <!-- Orange base circle -->
  <circle cx="85" cy="35" r="28" fill="url(#orangeGradient)" stroke="#E67E22" stroke-width="2"/>
  
  <!-- Orange segments detail -->
  <circle cx="85" cy="35" r="26" fill="none" stroke="#FFC857" stroke-width="1" opacity="0.4"/>
  
  <!-- Orange segment lines -->
  <line x1="85" y1="9" x2="85" y2="61" stroke="#FFC857" stroke-width="1" opacity="0.3"/>
  <line x1="57" y1="35" x2="113" y2="35" stroke="#FFC857" stroke-width="1" opacity="0.3"/>
  <line x1="63" y1="15" x2="107" y2="55" stroke="#FFC857" stroke-width="1" opacity="0.3"/>
  <line x1="107" y1="15" x2="63" y2="55" stroke="#FFC857" stroke-width="1" opacity="0.3"/>
  
  <!-- Orange shine -->
  <circle cx="75" cy="22" r="6" fill="white" opacity="0.2"/>
  
  <!-- CONNECTING ELEMENT (Leaf) -->
  <g transform="translate(60, 15) rotate(-25)">
    <ellipse cx="0" cy="0" rx="8" ry="4" fill="#6FCF97" stroke="#27AE60" stroke-width="1.5"/>
    <path d="M 0 -4 Q 3 -2 3 0 Q 3 2 0 4" fill="none" stroke="#27AE60" stroke-width="0.8" opacity="0.6"/>
  </g>
  
  <!-- TEXT: "FreshBite" -->
  <text x="130" y="50" font-family="'Arial', sans-serif" font-size="32" font-weight="700" fill="#654321" letter-spacing="0.5">
    Fresh<tspan fill="#FF9F43">Bite</tspan>
  </text>
  
  <!-- Tagline -->
  <text x="130" y="68" font-family="'Arial', sans-serif" font-size="10" font-weight="400" fill="#8B4513" opacity="0.7" letter-spacing="0.8">
    COOKIES &amp; FRUITS
  </text>
</svg>
