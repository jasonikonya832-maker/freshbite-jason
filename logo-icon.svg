<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cookieGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B4513;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9F43;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="appleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6FCF97;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle for icon -->
  <circle cx="50" cy="50" r="48" fill="#FFF8E7" stroke="#E8D7C3" stroke-width="2"/>
  
  <!-- COOKIE (Left) -->
  <circle cx="30" cy="38" r="22" fill="url(#cookieGradient)" stroke="#654321" stroke-width="1.5"/>
  
  <!-- Bite mark -->
  <path d="M 50 28 Q 56 35 50 42 Q 56 49 50 56 Z" fill="#FFF8E7"/>
  
  <!-- Chocolate chips -->
  <circle cx="22" cy="30" r="2.5" fill="#654321" opacity="0.8"/>
  <circle cx="35" cy="26" r="2" fill="#654321" opacity="0.8"/>
  <circle cx="38" cy="38" r="2.2" fill="#654321" opacity="0.8"/>
  <circle cx="33" cy="48" r="2" fill="#654321" opacity="0.8"/>
  <circle cx="20" cy="45" r="2.3" fill="#654321" opacity="0.8"/>
  
  <!-- ORANGE (Right) -->
  <circle cx="70" cy="38" r="22" fill="url(#orangeGradient)" stroke="#E67E22" stroke-width="1.5"/>
  
  <!-- Orange segments detail -->
  <circle cx="70" cy="38" r="20" fill="none" stroke="#FFC857" stroke-width="0.8" opacity="0.4"/>
  <line x1="70" y1="18" x2="70" y2="58" stroke="#FFC857" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="38" x2="90" y2="38" stroke="#FFC857" stroke-width="0.8" opacity="0.3"/>
  
  <!-- Orange shine -->
  <circle cx="63" cy="30" r="4" fill="white" opacity="0.2"/>
  
  <!-- Connecting leaf -->
  <g transform="translate(50, 22) rotate(-25)">
    <ellipse cx="0" cy="0" rx="6" ry="3" fill="#6FCF97" stroke="#27AE60" stroke-width="1"/>
    <path d="M 0 -3 Q 2 -1 2 0 Q 2 1 0 3" fill="none" stroke="#27AE60" stroke-width="0.6" opacity="0.6"/>
  </g>
</svg>
